interface:
  display_name: "Data Model"
  short_description: "Write per-model review files with separate information and decision tables"
  default_prompt: "Use $data-model when creating or revising JSON schemas, API payloads, SQL tables, migrations, or other structured data models. Apply Schemator's Lindy and simplicity criteria, create a separate Markdown review file for each data model, fill the information and decision tables, then produce the final revised model."
