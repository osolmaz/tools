name: OnurPi

on:
  push:
    paths:
      - "agents/onurpi/**"
      - ".github/workflows/onurpi.yml"
  pull_request:
    paths:
      - "agents/onurpi/**"
      - ".github/workflows/onurpi.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/onurpi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: agents/onurpi/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run mutate
      - name: Check workspace with Slophammer
        run: |
          trap 'rm -rf .github' EXIT
          sh scripts/run-slophammer.sh --stage-only
          npx --no-install slophammer-ts check . --execute
      - name: Check @onurpi/turn-fold package
        working-directory: agents/onurpi/packages/turn-fold
        run: npm run check
      - name: Mutate @onurpi/turn-fold package
        working-directory: agents/onurpi/packages/turn-fold
        run: npm run mutate
      - name: Check @onurpi/turn-fold package with Slophammer
        working-directory: agents/onurpi/packages/turn-fold
        run: npm run slophammer
      - name: Check pi-tui-history-replay package
        working-directory: agents/onurpi/packages/pi-tui-history-replay
        run: npm run check
      - name: Mutate pi-tui-history-replay package
        working-directory: agents/onurpi/packages/pi-tui-history-replay
        run: npm run mutate
      - name: Check pi-tui-history-replay package with Slophammer
        working-directory: agents/onurpi/packages/pi-tui-history-replay
        run: npm run slophammer
