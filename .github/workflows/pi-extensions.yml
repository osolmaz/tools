name: Pi extensions

on:
  push:
    paths:
      - "agents/pi-extensions/**"
      - ".github/workflows/pi-extensions.yml"
  pull_request:
    paths:
      - "agents/pi-extensions/**"
      - ".github/workflows/pi-extensions.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/pi-extensions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: agents/pi-extensions/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run mutate
      - run: npx --no-install slophammer-ts check . --execute
      - name: Check pi-turn-fold package
        working-directory: agents/pi-extensions/packages/pi-turn-fold
        run: npm run check
      - name: Mutate pi-turn-fold package
        working-directory: agents/pi-extensions/packages/pi-turn-fold
        run: npm run mutate
      - name: Check pi-turn-fold package with Slophammer
        working-directory: agents/pi-extensions/packages/pi-turn-fold
        run: npm run slophammer
      - name: Check pi-tui-history-replay package
        working-directory: agents/pi-extensions/packages/pi-tui-history-replay
        run: npm run check
      - name: Mutate pi-tui-history-replay package
        working-directory: agents/pi-extensions/packages/pi-tui-history-replay
        run: npm run mutate
      - name: Check pi-tui-history-replay package with Slophammer
        working-directory: agents/pi-extensions/packages/pi-tui-history-replay
        run: npm run slophammer
